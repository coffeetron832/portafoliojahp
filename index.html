<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Portafolio - Directorio</title>
    <style>
        /* Estilos base (Claro) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-size: 13px;
            color: #222;
            padding: 20px;
            line-height: 1.4;
            background-color: #fff;
            transition: background 0.3s, color 0.3s;
        }

        #pagecontainer { max-width: 800px; margin: 0 auto; }

        /* Menú */
        .menu { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #ccc; }
        .menu a { padding: 0 10px; border-right: 1px solid #222; color: #00e; text-decoration: none; cursor: pointer; }
        .menu a:last-child { border-right: none; }

        /* Ocultar secciones */
        .content-section { display: none; }
        .active { display: block; } 

        h1 { font-size: 20px; margin-bottom: 10px; }
        h2 { font-size: 15px; margin-top: 15px; color: #444; border-bottom: 1px solid #eee; }
        ul { margin: 10px 0; padding-left: 20px; }
        li { margin-bottom: 5px; }
        .date { color: #777; font-family: monospace; margin-right: 10px; }
        a:visited { color: #551a8b; }
        .placeholder { color: #d00; font-style: italic; font-weight: bold; }

        /* --- MODO OSCURO --- */
        body.dark-mode {
            background-color: #121212;
            color: #e0e0e0;
        }
        body.dark-mode .menu a { color: #4da6ff; border-right: 1px solid #e0e0e0; }
        body.dark-mode h1, body.dark-mode h2 { color: #fff; border-bottom: 1px solid #333; }
        body.dark-mode .date { color: #aaa; }
        body.dark-mode a:visited { color: #c6a0f6; }
        body.dark-mode .placeholder { color: #ff6b6b; }
        body.dark-mode .menu { border-bottom: 1px solid #444; }
    </style>
</head>
<body>

    <div id="pagecontainer">
        <nav class="menu">
            <a onclick="showSection('inicio')">Inicio</a>
            <a onclick="showSection('proyectos')">Proyectos</a>
            <a onclick="showSection('sobre-mi')">Sobre mí</a>
            <a onclick="showSection('contacto')">Contacto</a>
            <a onclick="toggleDarkMode()" style="font-weight: bold;">[Modo Oscuro/Claro]</a>
        </nav>

        <!-- Secciones (Contenido igual) -->
        <div id="inicio" class="content-section active">
            <h1>Bienvenido</h1>
            <p><span class="placeholder">[INTRODUCCIÓN: Quién eres en una frase]</span></p>
            <ul>
                <li><span class="placeholder">Tu especialidad principal</span></li>
            </ul>
        </div>

        <div id="proyectos" class="content-section">
            <h1>Proyectos</h1>
            <ul>
                <li><span class="date">2026-06-20</span> <strong>Proyecto 1:</strong> <span class="placeholder">[Nombre]</span></li>
            </ul>
        </div>

        <div id="sobre-mi" class="content-section">
            <h1>Sobre mí</h1>
            <ul><li><span class="placeholder">Info profesional</span></li></ul>
        </div>

        <div id="contacto" class="content-section">
            <h1>Contacto</h1>
            <ul><li><span class="placeholder">Datos de contacto</span></li></ul>
        </div>
    </div>

    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }
    </script>
</body>
</html>
